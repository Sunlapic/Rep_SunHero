<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SunHero Config</title>

  <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>

  <style>
    @font-face {
      font-family: "Forum";
      src: url("Forum-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #0e0c16;
      color: #f8e7b8;
      font-family: "Forum", Georgia, "Times New Roman", serif;
    }

    body {
      padding: 20px;
    }

    .box {
      background: linear-gradient(180deg, #171320, #21182d);
      border: 1px solid rgba(251, 191, 36, 0.35);
      border-radius: 14px;
      padding: 18px;
      line-height: 1.4;
      box-shadow: 0 8px 22px rgba(0,0,0,0.35);
    }

    h2 {
      color: #fbbf24;
      margin-top: 0;
      font-size: 28px;
      letter-spacing: 1px;
    }

    p {
      font-size: 18px;
      margin: 8px 0;
    }

    .muted {
      color: #b8a574;
      font-size: 15px;
      word-break: break-word;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>⚔ SunHero Config ⚔</h2>
    <p>Настройки не требуются.</p>
    <p class="muted">Backend: https://rep-sunhero.onrender.com</p>
  </div>
</body>
</html>
