<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sun Hero Panel</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0e0e10;
    color: white;
}

.container {
    padding: 10px;
}

.card {
    background: #18181b;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 10px;
}

.name {
    font-size: 18px;
    font-weight: bold;
    color: gold;
}

.hp-bar {
    width: 100%;
    height: 14px;
    background: #333;
    border-radius: 6px;
    overflow: hidden;
    margin-top: 5px;
}

.hp-fill {
    height: 100%;
    width: 100%;
    background: limegreen;
    transition: width 0.3s ease;
}

button {
    width: 100%;
    padding: 10px;
    background: #9147ff;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
    font-size: 14px;
}

button:hover {
    background: #772ce8;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <div class="name" id="name">Loading...</div>

        <div>Class: <span id="class">-</span></div>
        <div>Level: <span id="level">-</span></div>
        <div>Gold: <span id="gold">-</span></div>

        <div style="margin-top:10px;">HP</div>
        <div class="hp-bar">
            <div class="hp-fill" id="hpFill"></div>
        </div>

        <button onclick="joinGame()">JOIN</button>
    </div>

</div>

<script>
const API = "https://rep-sunhero.onrender.com";

let username = "guest";

// Twitch helper
window.Twitch.ext.onAuthorized = (auth) => {
    username = auth.userId; // можно заменить на display_name позже
    loadData();
};

// JOIN кнопка
function joinGame() {
    fetch(API + "/api/join", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: username })
    });
}

// загрузка стата
async function loadData() {
    try {
        const res = await fetch(API + "/api/players");
        const data = await res.json();

        const player = data[username];

        if (!player) return;

        document.getElementById("name").innerText = username;
        document.getElementById("class").innerText = player.class;
        document.getElementById("level").innerText = player.level;
        document.getElementById("gold").innerText = player.gold;

        let hpPercent = (player.hp / player.max_hp) * 100;
        document.getElementById("hpFill").style.width = hpPercent + "%";

    } catch (e) {
        console.log(e);
    }
}

// автообновление
setInterval(loadData, 2000);
</script>

</body>
</html>
