<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SunHero Extension</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
}

.card {
    padding: 10px;
    border: 1px solid #444;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
    <h3 id="name">Loading...</h3>
    <div>Class: <span id="class"></span></div>
    <div>Level: <span id="level"></span></div>
    <div>HP: <span id="hp"></span></div>

    <button onclick="join()">JOIN</button>
</div>

<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>

<script>
let twitch = window.Twitch ? window.Twitch.ext : null;
let username = "guest";

if (twitch) {
    twitch.onAuthorized(function(auth) {
        // Twitch user identity
        username = auth.userId;
        loadPlayer();
    });
}

async function join() {
    const res = await fetch("https://rep-sunhero.onrender.com/api/join", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username })
    });

    const data = await res.json();
    render(data);
}

async function loadPlayer() {
    const res = await fetch("https://rep-sunhero.onrender.com/api/player?username=" + username);
    const data = await res.json();
    render(data);
}

function render(p) {
    if (!p) return;

    document.getElementById("name").innerText = p.username;
    document.getElementById("class").innerText = p.class;
    document.getElementById("level").innerText = p.level;
    document.getElementById("hp").innerText = p.hp + " / " + p.max_hp;
}
</script>

</body>
</html>
