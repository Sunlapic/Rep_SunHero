<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >

  <title>SunHero Mobile</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #0e0c16;
      color: #f8e7b8;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      padding: 8px;
    }

    .header {
      text-align: center;
      color: #fbbf24;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 1.5px;
      padding: 8px 4px 10px;
      border-bottom: 1px solid rgba(251, 191, 36, 0.35);
      margin-bottom: 8px;
    }

    .box,
    .loading,
    .error,
    .empty {
      background: #171320;
      border: 1px solid rgba(251, 191, 36, 0.25);
      border-radius: 14px;
      padding: 12px;
      line-height: 1.4;
      font-size: 13px;
      text-align: center;
      color: #f8e7b8;
    }

    .error {
      color: #fecaca;
      border-color: rgba(239, 68, 68, 0.55);
    }

    .ok {
      color: #86efac;
    }

    .muted {
      color: #b8a574;
      font-size: 11px;
      margin-top: 8px;
    }

    .card {
      background: linear-gradient(180deg, #171320, #21182d);
      border: 1px solid rgba(251, 191, 36, 0.25);
      border-radius: 14px;
      padding: 10px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.35);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .name {
      color: #fff;
      font-size: 16px;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .class {
      color: #38bdf8;
      font-size: 11px;
      white-space: nowrap;
    }

    .hpbar {
      position: relative;
      height: 22px;
      background: #090711;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      overflow: hidden;
      margin: 8px 0 10px;
    }

    .hpfill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #dc2626, #22c55e);
    }

    .hptext {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      text-shadow: 1px 1px 2px #000;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin: 8px 0;
    }

    .stat {
      background: rgba(0,0,0,0.24);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 7px;
      min-height: 50px;
    }

    .label {
      color: #b8a574;
      font-size: 10px;
      margin-bottom: 3px;
    }

    .value {
      color: #fff;
      font-size: 14px;
      font-weight: 900;
    }

    .gold {
      color: #fbbf24;
    }

    .points {
      color: #86efac;
    }

    .btns {
      display: grid;
      gap: 7px;
      margin-top: 8px;
    }

    .btn {
      width: 100%;
      min-height: 50px;
      border: 0;
      border-radius: 12px;
      padding: 9px 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      touch-action: manipulation;
    }

    .btn:active {
      transform: scale(0.98);
      filter: brightness(1.15);
    }

    .btn small {
      display: block;
      font-size: 10px;
      font-weight: 600;
      opacity: 0.82;
      margin-top: 2px;
    }

    .b-str {
      background: linear-gradient(135deg, #7f1d1d, #ef4444);
    }

    .b-agi {
      background: linear-gradient(135deg, #064e3b, #22c55e);
    }

    .b-int {
      background: linear-gradient(135deg, #312e81, #8b5cf6);
    }

    .hint {
      margin-top: 9px;
      color: #b8a574;
      font-size: 11px;
      text-align: center;
      line-height: 1.35;
      word-break: break-word;
      min-height: 18px;
    }
  </style>

  <!-- Twitch требует helper как первый script во front-end файлах -->
  <script defer src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>

  <!-- v меняем, чтобы телефон не держал старый кеш -->
  <script defer src="mobile.js?v=20260613-3"></script>
</head>

<body>
  <div class="header">⚔ SUN HERO ⚔</div>

  <div id="ui" class="loading">
    HTML загружен. Запускаю мобильный скрипт...
  </div>

  <noscript>
    <div class="error">
      JavaScript выключен. Панель не может работать.
    </div>
  </noscript>
</body>
</html>
