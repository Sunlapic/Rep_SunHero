<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
<style>
body { margin:0; background:#0e0c16; color:#e6d3a3; font-family:Georgia,serif; }
.title { text-align:center; font-size:16px; color:#fbbf24; letter-spacing:2px;
         padding:7px; border-bottom:1px solid rgba(251,191,36,.4); }
.wrap { padding:8px 10px; }
.who { text-align:center; font-size:14px; padding-bottom:4px; }
.who b { color:#fff; }  .who span { color:#7ec8ff; font-size:11px; }
.hpbar { background:#0a0a12; border:1px solid #333; border-radius:4px; height:18px;
         margin:4px 0; position:relative; overflow:hidden; }
.hpfill { background:linear-gradient(90deg,#c33,#3c3); height:100%; transition:width .4s; }
.hptext { position:absolute; inset:0; text-align:center; font-size:11px; color:#fff;
          text-shadow:1px 1px 1px #000; line-height:18px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:2px 10px;
        font-size:13px; padding:4px 0; }
.grid .l { color:#c9b37a; }
.gold { color:#ffd700; font-weight:bold; }  .pts { color:#7fff7f; font-weight:bold; }
.w { color:#fff; font-weight:bold; }
.btns { display:flex; flex-direction:column; gap:6px; padding-top:5px; }
/* 📱 крупные кнопки: min-height 48px — стандарт для пальца! */
.btn { min-height:48px; border-radius:6px; padding:8px 10px; font-family:inherit;
       font-size:15px; cursor:pointer; text-align:center; }
.btn:active { filter:brightness(1.4); }
.btn small { font-size:10px; opacity:.75; }
.b-str { background:linear-gradient(180deg,#7a2222,#511414); color:#f5d27a; border:1px solid #a33; }
.b-agi { background:linear-gradient(180deg,#226022,#143d14); color:#bdf5a3; border:1px solid #3a3; }
.b-int { background:linear-gradient(180deg,#223a7a,#142451); color:#a3c8f5; border:1px solid #36a; }
.hint { text-align:center; font-size:10px; color:#8a795a; padding-top:6px; min-height:14px; }
.err { color:#ff7b7b; font-size:13px; text-align:center; padding:10px; }
</style>
</head>
<body>
<div class="title">⚔ SUN HERO</div>
<div class="wrap"><div id="ui">Loading...</div></div>
<script src="mobile.js"></script>
</body>
</html>
