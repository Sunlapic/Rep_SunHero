<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >

  <title>SunHero Mobile</title>

  <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
  <script defer src="mobile.js"></script>

  <style>
    @font-face {
  font-family: "Forum";
  src: url("Forum-Regular.ttf") format("truetype");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body,
    button,
    input,
    textarea {
      font-family: "Forum", Georgia, "Times New Roman", serif !important;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #0e0c16;
      color: #f8e7b8;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      padding: 8px;
    }

    body.dark {
      background: #0e0c16;
      color: #f8e7b8;
    }

    body.light {
      background: #f4efe3;
      color: #201522;
    }

    .header {
      text-align: center;
      color: #fbbf24;
      font-weight: 900;
      letter-spacing: 1.2px;
      font-size: 19px;
      padding: 7px 4px 9px;
      border-bottom: 1px solid rgba(251, 191, 36, 0.35);
      margin-bottom: 8px;
    }

    .box,
    .loading,
    .empty,
    .error {
      background: #171320;
      border: 1px solid rgba(251, 191, 36, 0.25);
      border-radius: 14px;
      padding: 12px;
      text-align: center;
      line-height: 1.4;
      font-size: 15px;
    }

    .error {
      color: #fecaca;
      border-color: rgba(239, 68, 68, 0.55);
    }

    .card {
      background: linear-gradient(180deg, #171320, #21182d);
      border: 1px solid rgba(251, 191, 36, 0.25);
      border-radius: 14px;
      padding: 10px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.35);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .name {
      color: #fff;
      font-size: 19px;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .class {
      color: #38bdf8;
      font-size: 13px;
      white-space: nowrap;
    }

    .hpbar {
      position: relative;
      height: 22px;
      background: #090711;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      overflow: hidden;
      margin: 8px 0 9px;
    }

    .hpfill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #dc2626, #22c55e);
      transition: width 0.25s ease;
    }

    .hptext {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      text-shadow: 1px 1px 2px #000;
    }

    .stat-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      margin: 8px 0;
    }

    .stat-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: rgba(0,0,0,0.24);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 8px 9px;
      min-height: 36px;
    }

    .stat-name {
      color: #b8a574;
      font-size: 15px;
      line-height: 1.15;
    }

    .stat-value {
      color: #fff;
      font-size: 17px;
      font-weight: 900;
      text-align: right;
      white-space: nowrap;
    }

    .stat-value.gold {
      color: #fbbf24;
    }

    .attr-points-box {
      background: rgba(34, 197, 94, 0.11);
      border: 1px solid rgba(134, 239, 172, 0.35);
      border-radius: 12px;
      padding: 9px;
      margin: 9px 0;
      text-align: center;
    }

    .attr-points-label {
      color: #b8a574;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .attr-points-value {
      color: #86efac;
      font-size: 21px;
      font-weight: 900;
    }

    .attr-title {
      color: #fbbf24;
      text-align: center;
      font-size: 19px;
      font-weight: 900;
      margin: 11px 0 8px;
      letter-spacing: 1px;
    }

    .btns {
      display: grid;
      gap: 7px;
      margin-top: 8px;
    }

    .btn {
      width: 100%;
      min-height: 50px;
      border: 0;
      border-radius: 12px;
      padding: 9px 10px;
      color: #fff;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      touch-action: manipulation;
    }

    .btn:active {
      transform: scale(0.98);
      filter: brightness(1.15);
    }

    .btn small {
      display: block;
      font-size: 12px;
      font-weight: 600;
      opacity: 0.86;
      margin-top: 2px;
      line-height: 1.15;
    }

    .b-str {
      background: linear-gradient(135deg, #7f1d1d, #ef4444);
    }

    .b-agi {
      background: linear-gradient(135deg, #064e3b, #22c55e);
    }

    .b-int {
      background: linear-gradient(135deg, #312e81, #8b5cf6);
    }

    .b-open {
      background: linear-gradient(135deg, #92400e, #f59e0b);
    }

    .hint,
    .mini {
      margin-top: 8px;
      color: #b8a574;
      font-size: 13px;
      text-align: center;
      line-height: 1.35;
      word-break: break-word;
    }
  </style>
</head>

<body>
  <div class="header">⚔ SUN HERO ⚔</div>

  <div id="ui" class="loading">
    Загрузка мобильной панели...
  </div>
</body>
</html>
