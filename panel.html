<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >

  <title>SunHero RPG Panel</title>

  <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>

  <style>
    :root {
      --bg: #0e0c16;
      --card: #171320;
      --card2: #21182d;
      --gold: #fbbf24;
      --text: #f8e7b8;
      --muted: #b8a574;
      --red: #ef4444;
      --green: #22c55e;
      --blue: #38bdf8;
      --purple: #a855f7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
    }

    body.dark {
      background: #0e0c16;
      color: var(--text);
    }

    body.light {
      background: #f4efe3;
      color: #201522;
    }

    .app {
      width: 100%;
      padding: 10px;
    }

    .header {
      text-align: center;
      color: var(--gold);
      font-weight: 800;
      letter-spacing: 1px;
      font-size: 18px;
      padding: 8px 4px 10px;
      border-bottom: 1px solid rgba(251, 191, 36, 0.35);
      margin-bottom: 10px;
    }

    .card {
      background: linear-gradient(180deg, var(--card), var(--card2));
      border: 1px solid rgba(251, 191, 36, 0.22);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .name {
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .class {
      color: var(--blue);
      font-size: 12px;
      text-align: right;
      white-space: nowrap;
    }

    .hpbar {
      position: relative;
      height: 22px;
      border-radius: 999px;
      background: #090711;
      border: 1px solid rgba(255,255,255,0.15);
      overflow: hidden;
      margin: 8px 0 10px;
    }

    .hpfill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #dc2626, #22c55e);
      transition: width 0.3s ease;
    }

    .hptext {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      text-shadow: 1px 1px 2px #000;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 10px 0;
    }

    .stat {
      background: rgba(0,0,0,0.24);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 8px;
      min-height: 54px;
    }

    .label {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .value {
      color: #fff;
      font-size: 16px;
      font-weight: 800;
    }

    .value.gold {
      color: var(--gold);
    }

    .value.points {
      color: #86efac;
    }

    .btns {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .btn {
      width: 100%;
      min-height: 46px;
      border: 0;
      border-radius: 12px;
      padding: 9px 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
    }

    .btn:active {
      transform: scale(0.98);
      filter: brightness(1.15);
    }

    .btn small {
      display: block;
      font-size: 10px;
      font-weight: 600;
      opacity: 0.82;
      margin-top: 2px;
    }

    .b-str {
      background: linear-gradient(135deg, #7f1d1d, #ef4444);
    }

    .b-agi {
      background: linear-gradient(135deg, #064e3b, #22c55e);
    }

    .b-int {
      background: linear-gradient(135deg, #312e81, #8b5cf6);
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      line-height: 1.35;
      word-break: break-word;
    }

    .error,
    .loading,
    .empty {
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      line-height: 1.4;
      font-size: 13px;
    }

    .error {
      color: #fecaca;
      border-color: rgba(239, 68, 68, 0.4);
    }

    .mini {
      margin-top: 8px;
      color: var(--muted);
      font-size: 10px;
      text-align: center;
      opacity: 0.75;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">⚔ SUN HERO ⚔</div>
    <div id="ui" class="loading">Загрузка...</div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
