<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<!-- Twitch Extension Helper (ОБЯЗАТЕЛЬНО) -->
<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>

<style>
body {
    margin:0;
    font-family: 'Georgia', serif;
    background:#0b0f14;
    color:#e6d3a3;
}
.wrapper { padding:15px; }
.title {
    text-align:center;
    font-size:22px;
    color:#f5d27a;
    margin-bottom:10px;
    letter-spacing:2px;
}
.card {
    background:linear-gradient(145deg, #1a1f2a, #0f141c);
    border:1px solid #3a2f1b;
    border-radius:10px;
    padding:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}
.row {
    display:flex;
    justify-content:space-between;
    padding:4px 0;
    border-bottom:1px solid rgba(255,255,255,0.05);
}
.label { color:#c9b37a; }
.value { color:#ffffff; font-weight:bold; }
.gold { color:#ffd700; }
.hp { color:#ff5c5c; }
.class { color:#7ec8ff; }
.err { color:#ff7b7b; font-size:13px; }
hr { border:none; border-top:1px solid rgba(255,255,255,0.08); margin:8px 0; }
</style>
</head>

<body>

<div class="wrapper">
    <div class="title">⚔ SUN HERO ⚔</div>
    <div class="card" id="panel">Loading hero...</div>
</div>

<script src="panel.js"></script>

</body>
</html>
