<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
<style>
body { margin:0; background:#0e0c16; color:#e6d3a3; font-family:Georgia,serif; }
.wrap { padding:10px; }
.title { text-align:center; font-size:18px; color:#fbbf24; letter-spacing:3px;
         padding:6px; border-bottom:1px solid rgba(251,191,36,.4);
         background:linear-gradient(90deg,transparent,rgba(251,191,36,.12),transparent); }
.row { display:flex; justify-content:space-between; padding:3px 0; font-size:13px; }
.label { color:#c9b37a; }  .value { color:#fff; font-weight:bold; }
.gold { color:#ffd700; }   .cls { color:#7ec8ff; }   .pts { color:#7fff7f; }
.hpbar { background:#0a0a12; border:1px solid #333; border-radius:4px; height:16px;
         margin:6px 0; position:relative; overflow:hidden; }
.hpfill { background:linear-gradient(90deg,#c33,#3c3); height:100%; transition:width .4s; }
.hptext { position:absolute; inset:0; text-align:center; font-size:10px; color:#fff;
          text-shadow:1px 1px 1px #000; line-height:16px; }
hr { border:none; border-top:1px solid rgba(251,191,36,.3); margin:8px 0; }
.btns { display:flex; gap:6px; }
.btn { flex:1; border-radius:5px; padding:7px 2px; font-family:inherit; cursor:pointer;
       font-size:13px; text-align:center; transition:transform .1s, filter .15s; }
.btn:hover { filter:brightness(1.3); transform:translateY(-1px); }
.btn:active { transform:translateY(1px); }
.btn small { display:block; font-size:9px; opacity:.75; margin-top:2px; }
.b-str { background:linear-gradient(180deg,#7a2222,#511414); color:#f5d27a; border:1px solid #a33; }
.b-agi { background:linear-gradient(180deg,#226022,#143d14); color:#bdf5a3; border:1px solid #3a3; }
.b-int { background:linear-gradient(180deg,#223a7a,#142451); color:#a3c8f5; border:1px solid #36a; }
.hint { text-align:center; font-size:10px; color:#8a795a; padding-top:6px; min-height:14px; }
.err { color:#ff7b7b; font-size:13px; }
</style>
</head>
<body>
<div class="title">⚔ SUN HERO ⚔</div>
<div class="wrap"><div id="ui">Loading...</div></div>
<script src="panel.js"></script>
</body>
</html>
